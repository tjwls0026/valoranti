<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>role</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/MonadABXY/mona-font/web/mona.css">
    <link rel="stylesheet" href="../../../../css/agent/realagent.css">
</head>
<body>
    <div class="backgroundblur">
        <a href="../../../home.html">
            <img src="../../../../img/img_home/valorant.svg" width="100" class="logo" >
        </a>
            <div class="rolebox">
                <div class="realrolebox">
                    <div class="agentname"><b>tejo</b></div>
                    <img class="agentbox    " src="../../../../img/img_agent/척후/테호.webp">
                    <img class="rolelogo" src="../../../../img/img_role/척후/척후대.svg">
                </div>
                <div class="sulbox">
                    <header>스킬</header>
                    <div class="skillbox">
                        <div class="skill1">
                        <img class="skillimg" src="../../../../img/img_agent/skill/tejo/잡입드론.png">
                        <div class="skilltext">잡임 드론</div>
                        <div class="skilltext_">지정한 위치에 라디오를 던져 주변 적들의 소리와 위치를 정찰합니다.</div>
                    </div>
                    <div class="skill2">
                        <img class="skillimg" src="../../../../img/img_agent/skill/tejo/특별배송.png"> 
                        <div class="skilltext">특별 배송</div>
                        <div class="skilltext_">폭발하며 적들에게 지속적으로 대미지를 입히는 유탄을 투사합니다.</div>
                    </div>
                    <div class="skill3">
                        <img class="skillimg" src="../../../../img/img_agent/skill/tejo/유도일제사격.png">
                        <div class="skilltext">유도 일제 사격</div>
                        <div class="skilltext_">고주파 음파를 방출하여 범위 내 적들의 시야와 청각을 방해합니다.</div>
                    </div>
                    <div class="skill4">
                        <img class="skillimg" src="../../../../img/img_agent/skill/tejo/아마겟돈.png">
                        <div class="skilltext">아마겟돈</div>
                        <div class="skilltext_">위성 신호를 활성화하여 맵 전체의 모든 적 위치를 일시적으로 감지합니다.</div>
                    </div>
                    <div class="skill5" style="display: none;">
                        <img class="skillimg" src="">
                        <div class="skilltext"></div>
                        <div class="skilltext_"></div>
                    </div>
                <div class="sulbox2">
                    <header>요원의 기본 정보</header>
                    <div class="minisul">
                        <div class="naedragon1">
                        <div class="name sun">name(이름)</div>
                        <div class="name hu">tejo</div>
                    </div>
                    <div class="naedragon2">
                        <div class="realname sun">real name(본명)</div>
                        <div class="realname hu">산티아고 리베라</div>
                    </div>
                    <div class="naedragon3">
                        <div class="hometown sun">hometown(고향)</div>
                        <div class="hometown_">
                            <img class="country hu" src="../../../../img/img_agent/country/콜롬비아.png">
                            <div class="hometown hu_">콜롬비아</div>
                        </div>
                    </div>
                    <div class="naedragon4">
                        <div class="Categorization sun">Categorization(카테고리)</div>
                        <div class="Categorization hu">일반인</div>
                    </div>
                    </div>
                </div>
            </div>
    </div>
</body>
</html>
