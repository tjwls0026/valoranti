<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>role</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/MonadABXY/mona-font/web/mona.css">
    <link rel="stylesheet" href="../../../../css/agent/realagent.css">
</head>
<body>
    <div class="backgroundblur">
        <a href="../../../home.html">
            <img src="../../../../img/img_home/valorant.svg" width="100" class="logo" >
        </a>
            <div class="rolebox">
                <div class="realrolebox">
                    <div class="agentname"><b>kay/o</b></div>
                    <img class="agentbox    " src="../../../../img/img_agent/척후/케이오.webp">
                    <img class="rolelogo" src="../../../../img/img_role/척후/척후대.svg">
                </div>
                <div class="sulbox">
                    <header>스킬</header>
                    <div class="skillbox">
                        <div class="skill1">
                        <img class="skillimg" src="../../../../img/img_agent/skill/ko/플래시드라이브.png">
                        <div class="skilltext">플래시/드라이브</div>
                        <div class="skilltext_">투척 후 공중에서 폭발하여 범위 내의 적을 실명시키는 섬광탄을 던집니다.</div>
                    </div>
                    <div class="skill2">
                        <img class="skillimg" src="../../../../img/img_agent/skill/ko/제로포인트.png"> 
                        <div class="skilltext">제로/포인트</div>
                        <div class="skilltext_">표면에 부착되는 단검을 던져 범위 내 적의 스킬 사용을 억제합니다.</div>
                    </div>
                    <div class="skill3">
                        <img class="skillimg" src="../../../../img/img_agent/skill/ko/파편탄.png">
                        <div class="skilltext">파편/탄</div>
                        <div class="skilltext_">바닥에 부착되어 중심부에 가까울수록 치명적인 대미지를 주는 폭발을 여러 번 일으킵니다.</div>
                    </div>
                    <div class="skill4">
                        <img class="skillimg" src="../../../../img/img_agent/skill/ko/무력화명령.png">
                        <div class="skilltext">무력화/명령</div>
                        <div class="skilltext_">과충전 상태가 되어 넓은 전자기 펄스를 방출하고 다운 시 아군이 부활시킬 수 있습니다.</div>
                    </div>
                <div class="sulbox2">
                    <header>요원의 기본 정보</header>
                    <div class="minisul">
                        <div class="naedragon1">
                        <div class="name sun">name(이름)</div>
                        <div class="name hu">kay/o</div>
                    </div>
                    <div class="naedragon2">
                        <div class="realname sun">real name(본명)</div>
                        <div class="realname hu">KAY/O</div>
                    </div>
                    <div class="naedragon3">
                        <div class="hometown sun">hometown(고향)</div>
                        <div class="hometown_">
                            
                            <div class="hometown hu_">불명</div>
                        </div>
                    </div>
                    <div class="naedragon4">
                        <div class="Categorization sun">Categorization(카테고리)</div>
                        <div class="Categorization hu">로봇</div>
                    </div>
                    </div>
                </div>
            </div>
    </div>
</body>
</html>
