<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>role</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/MonadABXY/mona-font/web/mona.css">
    <link rel="stylesheet" href="../../../../css/agent/realagent.css">
</head>
<body>
    <div class="backgroundblur">
        <a href="../../../home.html">
            <img src="../../../../img/img_home/valorant.svg" width="100" class="logo" >
        </a>
            <div class="rolebox">
                <div class="realrolebox">
                    <div class="agentname"><b>sova</b></div>
                    <img class="agentbox    " src="../../../../img/img_agent/척후/소바.webp">
                    <img class="rolelogo" src="../../../../img/img_role/척후/척후대.svg">
                </div>
                <div class="sulbox">
                    <header>스킬</header>
                    <div class="skillbox">
                        <div class="skill1">
                        <img class="skillimg" src="../../../../img/img_agent/skill/sova/올빼미드론.png">
                        <div class="skilltext">올빼미 드론</div>
                        <div class="skilltext_">조종 가능한 드론을 날려 적을 정찰하고 추적 다트를 발사합니다.</div>
                    </div>
                    <div class="skill2">
                        <img class="skillimg" src="../../../../img/img_agent/skill/sova/충격화살.png"> 
                        <div class="skilltext">충격 화살</div>
                        <div class="skilltext_">폭발하며 주변 적들에게 대미지를 주는 화살을 발사합니다.</div>
                    </div>
                    <div class="skill3">
                        <img class="skillimg" src="../../../../img/img_agent/skill/sova/정찰용화살.png">
                        <div class="skilltext">정찰용 화살</div>
                        <div class="skilltext_">시야 내에 있는 적들의 위치를 벽 너머로 드러내는 화살을 발사합니다.</div>
                    </div>
                    <div class="skill4">
                        <img class="skillimg" src="../../../../img/img_agent/skill/sova/사냥꾼의분노.png">
                        <div class="skilltext">사냥꾼의 분노</div>
                        <div class="skilltext_">벽을 관통하며 적에게 대미지를 주고 위치를 밝히는 에너지 포를 3회 발사합니다.</div>
                    </div>
                    
                <div class="sulbox2">
                    <header>요원의 기본 정보</header>
                    <div class="minisul">
                        <div class="naedragon1">
                        <div class="name sun">name(이름)</div>
                        <div class="name hu">sova</div>
                    </div>
                    <div class="naedragon2">
                        <div class="realname sun">real name(본명)</div>
                        <div class="realname hu">사샤 노비코프</div>
                    </div>
                    <div class="naedragon3">
                        <div class="hometown sun">hometown(고향)</div>
                        <div class="hometown_">
                            <img class="country hu" src="../../../../img/img_agent/country/러시아.png">
                            <div class="hometown hu_">러시아</div>
                        </div>
                    </div>
                    <div class="naedragon4">
                        <div class="Categorization sun">Categorization(카테고리)</div>
                        <div class="Categorization hu">일반인</div>
                    </div>
                    </div>
                </div>
            </div>
    </div>
</body>
</html>
