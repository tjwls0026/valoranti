<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>role</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/MonadABXY/mona-font/web/mona.css">
    <link rel="stylesheet" href="../../../../css/agent/realagent.css">
</head>
<body>
    <div class="backgroundblur">
        <a href="../../../home.html">
            <img src="../../../../img/img_home/valorant.svg" width="100" class="logo" >
        </a>
            <div class="rolebox">
                <div class="realrolebox">
                    <div class="agentname"><b>fade</b></div>
                    <img class="agentbox    " src="../../../../img/img_agent/척후/페이드.webp">
                    <img class="rolelogo" src="../../../../img/img_role/척후/척후대.svg">
                </div>
                <div class="sulbox">
                    <header>스킬</header>
                    <div class="skillbox">
                        <div class="skill1">
                        <img class="skillimg" src="../../../../img/img_agent/skill/pade/추적귀.png">
                        <div class="skilltext">추적귀</div>
                        <div class="skilltext_">야수 생명체를 보내 전방을 정찰하고 대상을 추적해 시야를 제한합니다.</div>
                    </div>
                    <div class="skill2">
                        <img class="skillimg" src="../../../../img/img_agent/skill/pade/포박.png"> 
                        <div class="skilltext">포박</div>
                        <div class="skilltext_">매듭을 던져 바닥에 떨어뜨리며, 범위 내 적들을 일시적으로 묶고 청각을 마비시킵니다.</div>
                    </div>
                    <div class="skill3">
                        <img class="skillimg" src="../../../../img/img_agent/skill/pade/귀체.png">
                        <div class="skilltext">귀체</div>
                        <div class="skilltext_">공포의 눈을 공중으로 던져 시야에 노출된 적들의 위치를 드러내고 추적선을 남깁니다.</div>
                    </div>
                    <div class="skill4">
                        <img class="skillimg" src="../../../../img/img_agent/skill/pade/황혼.png">
                        <div class="skilltext">황혼</div>
                        <div class="skilltext_">벽을 통과하는 공포의 파동을 보내 적들을 약화하고 공포의 추적선을 생성합니다.</div>
                    </div>
                    <div class="skill5" style="display: none;">
                        <img class="skillimg" src="">
                        <div class="skilltext"></div>
                        <div class="skilltext_"></div>
                    </div>
                <div class="sulbox2">
                    <header>요원의 기본 정보</header>
                    <div class="minisul">
                        <div class="naedragon1">
                        <div class="name sun">name(이름)</div>
                        <div class="name hu">fade</div>
                    </div>
                    <div class="naedragon2">
                        <div class="realname sun">real name(본명)</div>
                        <div class="realname hu">하잘 에위슬러</div>
                    </div>
                    <div class="naedragon3">
                        <div class="hometown sun">hometown(고향)</div>
                        <div class="hometown_">
                            <img class="country hu" src="../../../../img/img_agent/country/튀르키예.png">
                            <div class="hometown hu_">튀르키예</div>
                        </div>
                    </div>
                    <div class="naedragon4">
                        <div class="Categorization sun">Categorization(카테고리)</div>
                        <div class="Categorization hu">레디언트</div>
                    </div>
                    </div>
                </div>
            </div>
    </div>
</body>
</html>
