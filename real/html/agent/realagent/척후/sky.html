<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>role</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/MonadABXY/mona-font/web/mona.css">
    <link rel="stylesheet" href="../../../../css/agent/realagent.css">
</head>
<body>
    <div class="backgroundblur">
        <a href="../../../home.html">
            <img src="../../../../img/img_home/valorant.svg" width="100" class="logo" >
        </a>
            <div class="rolebox">
                <div class="realrolebox">
                    <div class="agentname"><b>skye</b></div>
                    <img class="agentbox    " src="../../../../img/img_agent/척후/스카이.webp">
                    <img class="rolelogo" src="../../../../img/img_role/척후/척후대.svg">
                </div>
                <div class="sulbox">
                    <header>스킬</header>
                    <div class="skillbox">
                        <div class="skill1">
                        <img class="skillimg" src="../../../../img/img_agent/skill/sky/재생.png">
                        <div class="skilltext">재생</div>
                        <div class="skilltext_">장착 후 경로에 있는 아군을 범위 내에서 동시에 치유합니다.</div>
                    </div>
                    <div class="skill2">
                        <img class="skillimg" src="../../../../img/img_agent/skill/sky/인도하는빛.png"> 
                        <div class="skilltext">인도하는 빛</div>
                        <div class="skilltext_">조종 가능한 매 장신구를 날려 원격으로 폭발시켜 적을 실명시킵니다.</div>
                    </div>
                    <div class="skill3">
                        <img class="skillimg" src="../../../../img/img_agent/skill/sky/정찰자.png">
                        <div class="skilltext">정찰자</div>
                        <div class="skilltext_">태즈메이니아호랑이 장신구를 소환해 직접 조종하며 적에게 대미지와 뇌진탕을 줍니다.</div>
                    </div>
                    <div class="skill4">
                        <img class="skillimg" src="../../../../img/img_agent/skill/sky/추적자.png">
                        <div class="skilltext">추적자</div>
                        <div class="skilltext_">가장 가까운 적 3명을 추적하는 투사체를 발사하여 시야를 제한합니다.</div>
                    </div>
                    <div class="skill5" style="display: none;">
                        <img class="skillimg" src="">
                        <div class="skilltext"></div>
                        <div class="skilltext_"></div>
                    </div>
                <div class="sulbox2">
                    <header>요원의 기본 정보</header>
                    <div class="minisul">
                        <div class="naedragon1">
                        <div class="name sun">name(이름)</div>
                        <div class="name hu">skye</div>
                    </div>
                    <div class="naedragon2">
                        <div class="realname sun">real name(본명)</div>
                        <div class="realname hu">키라 포스터</div>
                    </div>
                    <div class="naedragon3">
                        <div class="hometown sun">hometown(고향)</div>
                        <div class="hometown_">
                            <img class="country hu" src="../../../../img/img_agent/country/호주.png">
                            <div class="hometown hu_">호주</div>
                        </div>
                    </div>
                    <div class="naedragon4">
                        <div class="Categorization sun">Categorization(카테고리)</div>
                        <div class="Categorization hu">레디언트</div>
                    </div>
                    </div>
                </div>
            </div>
    </div>
</body>
</html>
