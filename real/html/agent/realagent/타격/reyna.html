<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>role</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/MonadABXY/mona-font/web/mona.css">
    <link rel="stylesheet" href="../../../../css/agent/realagent.css">
</head>
<body>
    <div class="backgroundblur">
        <a href="../../../home.html">
            <img src="../../../../img/img_home/valorant.svg" width="100" class="logo" >
        </a>
            <div class="rolebox">
                <div class="realrolebox">
                    <div class="agentname"><b>reyna</b></div>
                    <img class="agentbox    " src="../../../../img/img_agent/타격/레이나.png">
                    <img class="rolelogo" src="../../../../img/img_role/타격/타격대.svg">
                </div>
                <div class="sulbox">
                    <header>스킬</header>
                    <div class="skillbox">
                        
                    <div class="skill2">
                        <img class="skillimg" src="../../../../img/img_agent/skill/reyna/눈총.png"> 
                        <div class="skilltext">눈총</div>
                        <div class="skilltext_">파괴 가능한 눈을 던져 바라보는 모든 적의 시야를 차단합니다.</div>
                    </div>
                    <div class="skill3">
                        <img class="skillimg" src="../../../../img/img_agent/skill/reyna/포식.png">
                        <div class="skilltext">포식</div>
                        <div class="skilltext_">영혼 구슬을 소비해 체력을 빠르게 회복합니다.</div>
                    </div>
                    <div class="skill4">
                        <img class="skillimg" src="../../../../img/img_agent/skill/reyna/무시.png">
                        <div class="skilltext">무시</div>
                        <div class="skilltext_">영혼 구슬을 소비해 짧은 시간 무형 상태가 됩니다.</div>
                    </div>
                    <div class="skill5">
                        <img class="skillimg" src="../../../../img/img_agent/skill/reyna/여제.png">
                        <div class="skilltext">여제</div>
                        <div class="skilltext_">광폭 상태가 되어 사격 및 재장전 속도가 상승합니다.</div>
                    </div>
                <div class="sulbox2">
                    <header>요원의 기본 정보</header>
                    <div class="minisul">
                        <div class="naedragon1">
                        <div class="name sun">name(이름)</div>
                        <div class="name hu">reyna</div>
                    </div>
                    <div class="naedragon2">
                        <div class="realname sun">real name(본명)</div>
                        <div class="realname hu">지아나 오르티즈</div>
                    </div>
                    <div class="naedragon3">
                        <div class="hometown sun">hometown(고향)</div>
                        <div class="hometown_">
                            <img class="country hu" src="../../../../img/img_agent/country/멕시코.png">
                            <div class="hometown hu_">멕시코</div>
                        </div>
                    </div>
                    <div class="naedragon4">
                        <div class="Categorization sun">Categorization(카테고리)</div>
                        <div class="Categorization hu">레디언트</div>
                    </div>
                    </div>
                </div>
            </div>
    </div>
</body>
</html>
