<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>role</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/MonadABXY/mona-font/web/mona.css">
    <link rel="stylesheet" href="../../../../css/agent/realagent.css">
</head>
<body>
    <div class="backgroundblur">
        <a href="../../../home.html">
            <img src="../../../../img/img_home/valorant.svg" width="100" class="logo" >
        </a>
            <div class="rolebox">
                <div class="realrolebox">
                    <div class="agentname"><b>neon</b></div>
                    <img class="agentbox    " src="../../../../img/img_agent/타격/네온.png">
                    <img class="rolelogo" src="../../../../img/img_role/타격/타격대.svg">
                </div>
                <div class="sulbox">
                    <header>스킬</header>
                    <div class="skillbox">
                        <div class="skill1">
                        <img class="skillimg" src="../../../../img/img_agent/skill/neon/릴레이볼트.png">
                        <div class="skilltext">릴레이 볼트</div>
                        <div class="skilltext_">지면에 바운드되며 대상을 뇌진탕 상태로 만드는 에너지 전류를 던집니다.</div>
                    </div>
                    <div class="skill2">
                        <img class="skillimg" src="../../../../img/img_agent/skill/neon/고속기어.png"> 
                        <div class="skilltext">고속 기어</div>
                        <div class="skilltext_">속도가 수치화되어 빠르게 달리며, 우클릭 시 슬라이딩을 합니다.</div>
                    </div>
                    <div class="skill3">
                        <img class="skillimg" src="../../../../img/img_agent/skill/neon/추월차선.png">
                        <div class="skilltext">추월차선</div>
                        <div class="skilltext_">전방으로 시야를 차단하고 대미지를 주는 두 줄의 장벽을 세웁니다.</div>
                    </div>
                    <div class="skill4">
                        <img class="skillimg" src="../../../../img/img_agent/skill/neon/오버드라이브.png">
                        <div class="skilltext">오버드라이브</div>
                        <div class="skilltext_">가속 상태가 되며 질주하고 손끝에서 정밀한 번개 광선을 발사합니다.</div>
                    </div>
                <div class="sulbox2">
                    <header>요원의 기본 정보</header>
                    <div class="minisul">
                        <div class="naedragon1">
                        <div class="name sun">name(이름)</div>
                        <div class="name hu">neon</div>
                    </div>
                    <div class="naedragon2">
                        <div class="realname sun">real name(본명)</div>
                        <div class="realname hu">탈라 발데스</div>
                    </div>
                    <div class="naedragon3">
                        <div class="hometown sun">hometown(고향)</div>
                        <div class="hometown_">
                            <img class="country hu" src="../../../../img/img_agent/country/필리핀.png">
                            <div class="hometown hu_">필리핀</div>
                        </div>
                    </div>
                    <div class="naedragon4">
                        <div class="Categorization sun">Categorization(카테고리)</div>
                        <div class="Categorization hu">레디언트</div>
                    </div>
                    </div>
                </div>
            </div>
    </div>
</body>
</html>
