<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>role</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/MonadABXY/mona-font/web/mona.css">
    <link rel="stylesheet" href="../../../../css/agent/realagent.css">
</head>
<body>
    <div class="backgroundblur">
        <a href="../../../home.html">
            <img src="../../../../img/img_home/valorant.svg" width="100" class="logo" >
        </a>
            <div class="rolebox">
                <div class="realrolebox">
                    <div class="agentname"><b>iso</b></div>
                    <img class="agentbox    " src="../../../../img/img_agent/타격/아이소.png">
                    <img class="rolelogo" src="../../../../img/img_role/타격/타격대.svg">
                </div>
                <div class="sulbox">
                    <header>스킬</header>
                    <div class="skillbox">
                        <div class="skill1">
                        <img class="skillimg" src="../../../../img/img_agent/skill/iso/구슬보호막.png">
                        <div class="skilltext">구슬 보호막</div>
                        <div class="skilltext_">흐름 상태를 시작하며, 적 처치 후 생성되는 에너지를 쏘면 보호막을 얻습니다.</div>
                    </div>
                    <div class="skill2">
                        <img class="skillimg" src="../../../../img/img_agent/skill/iso/약화.png"> 
                        <div class="skilltext">취약</div>
                        <div class="skilltext_">벽을 통과하는 파동을 날려 닿은 모든 대상에게 취약 상태를 부여합니다.</div>
                    </div>
                    <div class="skill3">
                        <img class="skillimg" src="../../../../img/img_agent/skill/iso/대비책.png">
                        <div class="skilltext">대비책</div>
                        <div class="skilltext_">총탄을 모두 차단하며 전방으로 전진하는 에너지 장벽을 보냅니다.</div>
                    </div>
                    <div class="skill4">
                        <img class="skillimg" src="../../../../img/img_agent/skill/iso/청부계약.png">
                        <div class="skilltext">청부계약</div>
                        <div class="skilltext_">처음 적중한 적을 차원의 결투장으로 끌고 가 목숨을 건 1대1 결투를 벌입니다.</div>
                    </div>
                    
                <div class="sulbox2">
                    <header>요원의 기본 정보</header>
                    <div class="minisul">
                        <div class="naedragon1">
                        <div class="name sun">name(이름)</div>
                        <div class="name hu">iso</div>
                    </div>
                    <div class="naedragon2">
                        <div class="realname sun">real name(본명)</div>
                        <div class="realname hu">리자오위</div>
                    </div>
                    <div class="naedragon3">
                        <div class="hometown sun">hometown(고향)</div>
                        <div class="hometown_">
                            <img class="country hu" src="../../../../img/img_agent/country/중국.png">
                            <div class="hometown hu_">중국</div>
                        </div>
                    </div>
                    <div class="naedragon4">
                        <div class="Categorization sun">Categorization(카테고리)</div>
                        <div class="Categorization hu">레디언트</div>
                    </div>
                    </div>
                </div>
            </div>
    </div>
</body>
</html>
