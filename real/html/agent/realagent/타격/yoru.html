<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>role</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/MonadABXY/mona-font/web/mona.css">
    <link rel="stylesheet" href="../../../../css/agent/realagent.css">
</head>
<body>
    <div class="backgroundblur">
        <a href="../../../home.html">
            <img src="../../../../img/img_home/valorant.svg" width="100" class="logo" >
        </a>
            <div class="rolebox">
                <div class="realrolebox">
                    <div class="agentname"><b>yoru</b></div>
                    <img class="agentbox    " src="../../../../img/img_agent/타격/요루.png">
                    <img class="rolelogo" src="../../../../img/img_role/타격/타격대.svg">
                </div>
                <div class="sulbox">
                    <header>스킬</header>
                    <div class="skillbox">
                        <div class="skill1">
                        <img class="skillimg" src="../../../../img/img_agent/skill/yoru/기만.png">
                        <div class="skilltext">기만</div>
                        <div class="skilltext_">자신의 분신을 전방으로 보내며, 파괴 시 적을 실명시킵니다.</div>
                    </div>
                    <div class="skill2">
                        <img class="skillimg" src="../../../../img/img_agent/skill/yoru/기습.png"> 
                        <div class="skilltext">기습</div>
                        <div class="skilltext_">표면에 부딪히면 튕기는 섬광탄을 던져 적을 실명시킵니다.</div>
                    </div>
                    <div class="skill3">
                        <img class="skillimg" src="../../../../img/img_agent/skill/yoru/관문충돌.png">
                        <div class="skilltext">관문 충돌</div>
                        <div class="skilltext_">차원의 실을 사출한 뒤 활성화하여 해당 위치로 텔레포트합니다.</div>
                    </div>
                    <div class="skill4">
                        <img class="skillimg" src="../../../../img/img_agent/skill/yoru/차원포류.png">
                        <div class="skilltext">차원 표류</div>
                        <div class="skilltext_">가면을 써 다른 차원으로 들어가 적에게 보이지 않는 무적 상태가 됩니다.</div>
                    </div>
                    <div class="skill5" style="display: none;">
                        <img class="skillimg" src="">
                        <div class="skilltext"></div>
                        <div class="skilltext_"></div>
                    </div>
                <div class="sulbox2">
                    <header>요원의 기본 정보</header>
                    <div class="minisul">
                        <div class="naedragon1">
                        <div class="name sun">name(이름)</div>
                        <div class="name hu">yoru</div>
                    </div>
                    <div class="naedragon2">
                        <div class="realname sun">real name(본명)</div>
                        <div class="realname hu">키리타니 료</div>
                    </div>
                    <div class="naedragon3">
                        <div class="hometown sun">hometown(고향)</div>
                        <div class="hometown_">
                            <img class="country hu" src="../../../../img/img_agent/country/일본.png">
                            <div class="hometown hu_">일본</div>
                        </div>
                    </div>
                    <div class="naedragon4">
                        <div class="Categorization sun">Categorization(카테고리)</div>
                        <div class="Categorization hu">레디언트</div>
                    </div>
                    </div>
                </div>
            </div>
    </div>
</body>
</html>
