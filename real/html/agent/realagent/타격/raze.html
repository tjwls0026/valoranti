<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>role</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/MonadABXY/mona-font/web/mona.css">
    <link rel="stylesheet" href="../../../../css/agent/realagent.css">
</head>
<body>
    <div class="backgroundblur">
        <a href="../../../home.html">
            <img src="../../../../img/img_home/valorant.svg" width="100" class="logo" >
        </a>
            <div class="rolebox">
                <div class="realrolebox">
                    <div class="agentname"><b>raze</b></div>
                    <img class="agentbox    " src="../../../../img/img_agent/타격/레이즈.png">
                    <img class="rolelogo" src="../../../../img/img_role/타격/타격대.svg">
                </div>
                <div class="sulbox">
                    <header>스킬</header>
                    <div class="skillbox">
                        <div class="skill1">
                            <img class="skillimg" src="../../../../img/img_agent/skill/raze/폭발봇.png">
                            <div class="skilltext">폭탄봇</div>
                            <div class="skilltext_">바닥을 유도하며 적을 <br>잠금하고 추격해 폭발합니다.</div>
                        </div>
                        <div class="skill2">
                            <img class="skillimg" src="../../../../img/img_agent/skill/raze/페인트탄.png"> 
                            <div class="skilltext">페인트탄</div>
                            <div class="skilltext_">집속탄을 던져 투척 후 <br>자탄이 생성되어 폭발합니다.</div>
                        </div>
                        <div class="skill3">
                            <img class="skillimg" src="../../../../img/img_agent/skill/raze/폭팔팩.png">
                            <div class="skilltext">폭발팩</div>
                            <div class="skilltext_">표면에 부착 후 재사용 시 <br>대미지를 주고 밀어냅니다.</div>
                        </div>
                        <div class="skill4">
                            <img class="skillimg" src="../../../../img/img_agent/skill/raze/대미장식.png">
                            <div class="skilltext">대미장식</div>
                            <div class="skilltext_">장착 후 발사하여 넓은 <br>범위에치명적인 대미지를 줍니다.</div>
                        </div>
                <div class="sulbox2">
                    <header>요원의 기본 정보</header>
                    <div class="minisul">
                        <div class="naedragon1">
                        <div class="name sun">name(이름)</div>
                        <div class="name hu">raze</div>
                    </div>
                    <div class="naedragon2">
                        <div class="realname sun">real name(본명)</div>
                        <div class="realname hu">타이지 가요</div>
                    </div>
                    <div class="naedragon3">
                        <div class="hometown sun">hometown(고향)</div>
                        <div class="hometown_">
                            <img class="country hu" src="../../../../img/img_agent/country/브라질.png">
                            <div class="hometown hu_">브라질</div>
                        </div>
                    </div>
                    <div class="naedragon4">
                        <div class="Categorization sun">Categorization(카테고리)</div>
                        <div class="Categorization hu">일반인</div>
                    </div>
                    </div>
                </div>
            </div>
    </div>
</body>
</html>
