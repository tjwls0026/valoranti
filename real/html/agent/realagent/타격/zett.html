<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>role</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/MonadABXY/mona-font/web/mona.css">
    <link rel="stylesheet" href="../../../../css/agent/realagent.css">
</head>
<body>
    <div class="backgroundblur">
        <a href="../../../home.html">
            <img src="../../../../img/img_home/valorant.svg" width="100" class="logo" >
        </a>
            <div class="rolebox">
                <div class="realrolebox">
                    <div class="agentname"><b>zett</b></div>
                    <img class="agentbox    " src="../../../../img/img_agent/타격/제트.png">
                    <img class="rolelogo" src="../../../../img/img_role/타격/타격대.svg">
                </div>
                <div class="sulbox">
                    <header>스킬</header>
                    <div class="skillbox">
                        <div class="skill1">
                        <img class="skillimg" src="../../../../img/img_agent/skill/zett/포류.png">
                        <div class="skilltext">포류</div>
                        <div class="skilltext_">낙하 시 점프를 길게 누르면 활공합니다.</div>
                    </div>
                    <div class="skill2">
                        <img class="skillimg" src="../../../../img/img_agent/skill/zett/연막폭발.png"> 
                        <div class="skilltext">연막폭발</div>
                        <div class="skilltext_">던지면 즉시 생성되며, <br>길게 누르면 조준점 방향으로 휘는 연막탄입니다.</div>
                    </div>
                    <div class="skill3">
                        <img class="skillimg" src="../../../../img/img_agent/skill/zett/상승기류.png">
                        <div class="skilltext">상승기류</div>
                        <div class="skilltext_">제트가 즉시 높이 <br>날아오릅니다.</div>
                    </div>
                    <div class="skill4">
                        <img class="skillimg" src="../../../../img/img_agent/skill/zett/순풍.png">
                        <div class="skilltext">순풍</div>
                        <div class="skilltext_">사용 시 돌풍을 <br>준비하며, <br>다시 사용하면 <br>이동 방향으로 <br>돌진합니다.</div>
                    </div>
                    <div class="skill5">
                        <img class="skillimg" src="../../../../img/img_agent/skill/zett/칼날폭풍.png">
                        <div class="skilltext">칼날 폭풍</div>
                        <div class="skilltext_">처치 시 충전되는 <br>단검을 장착합니다.</div>
                    </div>
                <div class="sulbox2">
                    <header>요원의 기본 정보</header>
                    <div class="minisul">
                        <div class="naedragon1">
                        <div class="name sun">name(이름)</div>
                        <div class="name hu">zett</div>
                    </div>
                    <div class="naedragon2">
                        <div class="realname sun">real name(본명)</div>
                        <div class="realname hu">한선우</div>
                    </div>
                    <div class="naedragon3">
                        <div class="hometown sun">hometown(고향)</div>
                        <div class="hometown_">
                            <img class="country hu" src="../../../../img/img_agent/country/대한민국.png">
                            <div class="hometown hu_">대한민국</div>
                        </div>
                    </div>
                    <div class="naedragon4">
                        <div class="Categorization sun">Categorization(카테고리)</div>
                        <div class="Categorization hu">레디언트</div>
                    </div>
                    </div>
                </div>
            </div>
    </div>
</body>
</html>
