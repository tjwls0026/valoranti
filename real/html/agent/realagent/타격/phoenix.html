<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>role</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/MonadABXY/mona-font/web/mona.css">
    <link rel="stylesheet" href="../../../../css/agent/realagent.css">
</head>
<body>
    <div class="backgroundblur">
        <a href="../../../home.html">
            <img src="../../../../img/img_home/valorant.svg" width="100" class="logo" >
        </a>
            <div class="rolebox">
                <div class="realrolebox">
                    <div class="agentname"><b>phoenix</b></div>
                    <img class="agentbox    " src="../../../../img/img_agent/타격/피닉스.png">
                    <img class="rolelogo" src="../../../../img/img_role/타격/타격대.svg">
                </div>
                <div class="sulbox">
                    <header>스킬</header>
                    <div class="skillbox">
                        <div class="skill1">
                            <img class="skillimg" src="../../../../img/img_agent/skill/phonenix/불길.png">
                            <div class="skilltext">불길</div>
                            <div class="skilltext_">시야를 차단하고 대미지를 주며, 자신은 회복하는 화염 장벽을 만듭니다.</div>
                        </div>
                        <div class="skill2">
                            <img class="skillimg" src= "../../../../img/img_agent/skill/phonenix/커브볼.png">
                            <div class="skilltext">커브볼</div>
                            <div class="skilltext_">곡선 궤도로 휘어지며 폭발해 적의 시야를 차단하는 섬광탄을 던집니다.</div>
                        </div>
                        <div class="skill3">
                            <img class="skillimg" src="../../../../img/img_agent/skill/phonenix/뜨거운손.png">
                            <div class="skilltext">뜨거운 손</div>
                            <div class="skilltext_">화염 구체를 던져 바닥에 화염 지대를 생성하고 자신을 회복합니다.</div>
                        </div>
                        <div class="skill4">
                            <img class="skillimg" src="../../../../img/img_agent/skill/phonenix/역습.png">
                            <div class="skilltext">역습</div>
                            <div class="skilltext_">자신의 위치를 표기한 뒤, 사망하거나 시간이 끝나면 원래 위치로 부활합니다.</div>
                        </div>
                        
                <div class="sulbox2">
                    <header>요원의 기본 정보</header>
                    <div class="minisul">
                        <div class="naedragon1">
                        <div class="name sun">name(이름)</div>
                        <div class="name hu">phoenix</div>
                    </div>
                    <div class="naedragon2">
                        <div class="realname sun">real name(본명)</div>
                        <div class="realname hu">제이미 아데예미</div>
                    </div>
                    <div class="naedragon3">
                        <div class="hometown sun">hometown(고향)</div>
                        <div class="hometown_">
                            <img class="country hu" src="../../../../img/img_agent/country/영국.png">
                            <div class="hometown hu_">영국</div>
                        </div>
                    </div>
                    <div class="naedragon4">
                        <div class="Categorization sun">Categorization(카테고리)</div>
                        <div class="Categorization hu">레디언트</div>
                    </div>
                    </div>
                </div>
            </div>
    </div>
</body>
</html>
