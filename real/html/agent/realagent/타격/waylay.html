<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>role</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/MonadABXY/mona-font/web/mona.css">
    <link rel="stylesheet" href="../../../../css/agent/realagent.css">
</head>
<body>
    <div class="backgroundblur">
        <a href="../../../home.html">
            <img src="../../../../img/img_home/valorant.svg" width="100" class="logo" >
        </a>
            <div class="rolebox">
                <div class="realrolebox">
                    <div class="agentname"><b>waylay</b></div>
                    <img class="agentbox    " src="../../../../img/img_agent/타격/웨이레이.png">
                    <img class="rolelogo" src="../../../../img/img_role/타격/타격대.svg">
                </div>
                <div class="sulbox">
                    <header>스킬</header>
                    <div class="skillbox">
                        <div class="skill1">
                        <img class="skillimg" src="../../../../img/img_agent/skill/waylay/포화.png">
                        <div class="skilltext">포화</div>
                        <div class="skilltext_">빛의 덩어리를 던져 <br>폭발시키고<br>범위 내 적의 속도를 <br>둔화합니다.</div>
                    </div>
                    <div class="skill2">
                        <img class="skillimg" src="../../../../img/img_agent/skill/waylay/광속.png"> 
                        <div class="skilltext">광속</div>
                        <div class="skilltext_">속도를 올리고 <br>전방으로 <br>빠르게 돌진합니다.</div>
                    </div>
                    <div class="skill3">
                        <img class="skillimg" src="../../../../img/img_agent/skill/waylay/굴절.png">
                        <div class="skilltext">굴절</div>
                        <div class="skilltext_">빛의 신호기를 설치한 뒤, <br>재활용 시 무적 상태로 <br>신호기에 되돌아옵니다.</div>
                    </div>
                    <div class="skill4">
                        <img class="skillimg" src="../../../../img/img_agent/skill/waylay/초점교차.png">
                        <div class="skilltext">초점 교차</div>
                        <div class="skilltext_">자신의 빛의 잔상을 <br>만들어 속도를 높이고 <br>넓은 범위의 적을 방해합니다.</div>
                    </div>
                    
                    </div>
                <div class="sulbox2">
                    <header>요원의 기본 정보</header>
                    <div class="minisul">
                        <div class="naedragon1">
                        <div class="name sun">name(이름)</div>
                        <div class="name hu">waylay</div>
                    </div>
                    <div class="naedragon2">
                        <div class="realname sun">real name(본명)</div>
                        <div class="realname hu">아리야 생깨우</div>
                    </div>
                    <div class="naedragon3">
                        <div class="hometown sun">hometown(고향)</div>
                        <div class="hometown_">
                            <img class="country hu" src="../../../../img/img_agent/country/태국.png">
                            <div class="hometown hu_">태국</div>
                        </div>
                    </div>
                    <div class="naedragon4">
                        <div class="Categorization sun">Categorization(카테고리)</div>
                        <div class="Categorization hu">레디언트</div>
                    </div>
                    </div>
                </div>
            </div>
    </div>
</body>
</html>
