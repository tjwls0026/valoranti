<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>role</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/MonadABXY/mona-font/web/mona.css">
    <link rel="stylesheet" href="../../../../css/agent/realagent.css">
</head>
<body>
    <div class="backgroundblur">
        <a href="../../../home.html">
            <img src="../../../../img/img_home/valorant.svg" width="100" class="logo" >
        </a>
            <div class="rolebox">
                <div class="realrolebox">
                    <div class="agentname"><b>vito</b></div>
                    <img class="agentbox    " src="../../../../img/img_agent/감시/비토.webp">
                    <img class="rolelogo" src="../../../../img/img_role/감시/감시.svg">
                </div>
                <div class="sulbox">
                    <header>스킬</header>
                    <div class="skillbox">
                        <div class="skill1">
                            <img class="skillimg" src="../../../../img/img_agent/skill/vito/목조르기.png">
                            <div class="skilltext">목조르기</div>
                            <div class="skilltext_">표면에 닿으면 적을 속박하고 청각 약화 및 부패 효과를 주는 함정을 셍성한다</div>
                        </div>
                        <div class="skill2">
                            <img class="skillimg" src="../../../../img/img_agent/skill/vito/지름길.png"> 
                            <div class="skilltext">지름길</div>
                            <div class="skilltext_">지면에 설치 후 바라보며 재활성화 시 해당 위치로 순간이동한다.</div>
                        </div>
                        <div class="skill3">
                            <img class="skillimg" src="../../../../img/img_agent/skill/vito/요격기.png">
                            <div class="skilltext">요격기</div>
                            <div class="skilltext_">설치 및 활성화 시 범위 내 적의 투척 및 사격용 장치들을 전부 파괴한다.</div>
                        </div>
                        <div class="skill4">
                            <img class="skillimg" src="../../../../img/img_agent/skill/vito/진화.png">
                            <div class="skilltext">진화</div>
                            <div class="skilltext_">즉시 전투 자극제 및 체력 회복 효과를 얻고, 모든 해로운 효과에 면역 상태가 된다.</div>
                        </div>
                        <div class="skill5" style="display: none;">
                            <img class="skillimg" src="">
                            <div class="skilltext"></div>
                            <div class="skilltext_"></div>
                        </div>
                <div class="sulbox2">
                    <header>요원의 기본 정보</header>
                    <div class="minisul">
                        <div class="naedragon1">
                        <div class="name sun">name(이름)</div>
                        <div class="name hu">vito</div>
                    </div>
                    <div class="naedragon2">
                        <div class="realname sun">real name(본명)</div>
                        <div class="realname hu">불명</div>
                    </div>
                    <div class="naedragon3">
                        <div class="hometown sun">hometown(고향)</div>
                        <div class="hometown_">
                            <img class="country hu" src="../../../../img/img_agent/country/세네갈.png">
                            <div class="hometown hu_">세네갈</div>
                        </div>
                    </div>
                    <div class="naedragon4">
                        <div class="Categorization sun">Categorization(카테고리)</div>
                        <div class="Categorization hu">레디언트</div>
                    </div>
                    </div>
                </div>
            </div>
    </div>
</body>
</html>
