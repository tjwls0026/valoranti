<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>role</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/MonadABXY/mona-font/web/mona.css">
    <link rel="stylesheet" href="../../../../css/agent/realagent.css">
</head>
<body>
    <div class="backgroundblur">
        <a href="../../../home.html">
            <img src="../../../../img/img_home/valorant.svg" width="100" class="logo" >
        </a>
            <div class="rolebox">
                <div class="realrolebox">
                    <div class="agentname"><b>harbor</b></div>
                    <img class="agentbox    " src="../../../../img/img_agent/연막/하버.webp">
                    <img class="rolelogo" src="../../../../img/img_role/연막/연막.svg">
                </div>
                <div class="sulbox">
                    <header>스킬</header>
                    <div class="skillbox">
                        <div class="skill1">
                        <img class="skillimg" src="../../../../img/img_agent/skill/harbor/폭풍쇄도.png">
                        <div class="skilltext">폭풍쇄도</div>
                        <div class="skilltext_">벽을 통과하여 전방으로 전진하며 적을 둔화하는 물의 장벽을 보냅니다.</div>
                    </div>
                    <div class="skill2">
                        <img class="skillimg" src="../../../../img/img_agent/skill/harbor/해만.png"> 
                        <div class="skilltext">해만</div>
                        <div class="skilltext_">총탄을 방어할 수 있는 구체 형태의 물 방패 연막을 던져 설치합니다.</div>
                    </div>
                    <div class="skill3">
                        <img class="skillimg" src="../../../../img/img_agent/skill/harbor/만조.png">
                        <div class="skilltext">만조</div>
                        <div class="skilltext_">궤적을 제어하여 조종할 수 있는 거대한 물의 연막 장벽을 길게 세웁니다.</div>
                    </div>
                    <div class="skill4">
                        <img class="skillimg" src="../../../../img/img_agent/skill/harbor/심판.png">
                        <div class="skilltext">심판</div>
                        <div class="skilltext_">바닥에 거대한 간헐천 구역을 생성하여 범위 내 적들에게 정기적으로 뇌진탕을 줍니다.</div>
                    </div>
                    <div class="skill5" style="display: none;">
                        <img class="skillimg" src="">
                        <div class="skilltext"></div>
                        <div class="skilltext_"></div>
                    </div>
                <div class="sulbox2">
                    <header>요원의 기본 정보</header>
                    <div class="minisul">
                        <div class="naedragon1">
                        <div class="name sun">name(이름)</div>
                        <div class="name hu">harbor</div>
                    </div>
                    <div class="naedragon2">
                        <div class="realname sun">real name(본명)</div>
                        <div class="realname hu">바룬 바트라</div>
                    </div>
                    <div class="naedragon3">
                        <div class="hometown sun">hometown(고향)</div>
                        <div class="hometown_">
                            <img class="country hu" src="../../../../img/img_agent/country/인도.png">
                            <div class="hometown hu_">인도</div>
                        </div>
                    </div>
                    <div class="naedragon4">
                        <div class="Categorization sun">Categorization(카테고리)</div>
                        <div class="Categorization hu">일반인 (고대 유물 사용자)</div>
                    </div>
                    </div>
                </div>
            </div>
    </div>
</body>
</html>
