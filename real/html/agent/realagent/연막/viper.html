<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>role</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/MonadABXY/mona-font/web/mona.css">
    <link rel="stylesheet" href="../../../../css/agent/realagent.css">
</head>
<body>
    <div class="backgroundblur">
        <a href="../../../home.html">
            <img src="../../../../img/img_home/valorant.svg" width="100" class="logo" >
        </a>
            <div class="rolebox">
                <div class="realrolebox">
                    <div class="agentname"><b>viper</b></div>
                    <img class="agentbox    " src="../../../../img/img_agent/연막/바이퍼.webp">
                    <img class="rolelogo" src="../../../../img/img_role/연막/연막.svg">
                </div>
                <div class="sulbox">
                    <header>스킬</header>
                    <div class="skillbox">
                        <div class="skill1">
                        <img class="skillimg" src="../../../../img/img_agent/skill/viper/뱀이빨.png">
                        <div class="skilltext">뱀 이빨</div>
                        <div class="skilltext_">폭발 시 바닥에 산성 지대를 생성하여 피해를 주고 취약 상태로 만듭니다.</div>
                    </div>
                    <div class="skill2">
                        <img class="skillimg" src="../../../../img/img_agent/skill/viper/독성연기.png"> 
                        <div class="skilltext">독성 연기</div>
                        <div class="skilltext_">연료를 소모해 재사용이 가능한 가스 방출기를 던져 구체 연막을 켭니다.</div>
                    </div>
                    <div class="skill3">
                        <img class="skillimg" src="../../../../img/img_agent/skill/viper/독성장막.png">
                        <div class="skilltext">독성장막</div>
                        <div class="skilltext_">연료를 소모해 길게 배치한 가스 분사기 라인을 활성화하여 장벽 연막을 켭니다.</div>
                    </div>
                    <div class="skill4">
                        <img class="skillimg" src="../../../../img/img_agent/skill/viper/독사의구덩이.png">
                        <div class="skilltext">독사의 구덩이</div>
                        <div class="skilltext_">주변에 거대한 화학 가스 클라우드를 생성하여 아군의 시야를 확보하고 적을 부패시킵니다.</div>
                    </div>
                    <div class="skill5" style="display: none;">
                        <img class="skillimg" src="">
                        <div class="skilltext"></div>
                        <div class="skilltext_"></div>
                    </div>
                <div class="sulbox2">
                    <header>요원의 기본 정보</header>
                    <div class="minisul">
                        <div class="naedragon1">
                        <div class="name sun">name(이름)</div>
                        <div class="name hu">viper</div>
                    </div>
                    <div class="naedragon2">
                        <div class="realname sun">real name(본명)</div>
                        <div class="realname hu">사빈 칼라스</div>
                    </div>
                    <div class="naedragon3">
                        <div class="hometown sun">hometown(고향)</div>
                        <div class="hometown_">
                            <img class="country hu" src="../../../../img/img_agent/country/미국.png">
                            <div class="hometown hu_">미국</div>
                        </div>
                    </div>
                    <div class="naedragon4">
                        <div class="Categorization sun">Categorization(카테고리)</div>
                        <div class="Categorization hu">일반인 (과학자)</div>
                    </div>
                    </div>
                </div>
            </div>
    </div>
</body>
</html>
