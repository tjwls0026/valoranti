<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>role</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/MonadABXY/mona-font/web/mona.css">
    <link rel="stylesheet" href="../../../../css/agent/realagent.css">
</head>
<body>
    <div class="backgroundblur">
        <a href="../../../home.html">
            <img src="../../../../img/img_home/valorant.svg" width="100" class="logo" >
        </a>
            <div class="rolebox">
                <div class="realrolebox">
                    <div class="agentname"><b>miks</b></div>
                    <img class="agentbox    " src="../../../../img/img_agent/연막/믹스.webp">
                    <img class="rolelogo" src="../../../../img/img_role/연막/연막.svg">
                </div>
                <div class="sulbox">
                    <header>스킬</header>
                    <div class="skillbox">
                        <div class="skill1">
                        <img class="skillimg" src="../../../../img/img_agent/skill/miks/M파동.png">
                        <div class="skilltext">M파동</div>
                        <div class="skilltext_">뇌진탕을 일으키는 소리나 아군을 치유하는 음파를 발사하는 장치를 투척합니다.</div>
                    </div>
                    <div class="skill2">
                        <img class="skillimg" src="../../../../img/img_agent/skill/miks/화음.png"> 
                        <div class="skilltext">화음</div>
                        <div class="skilltext_">자신과 지정한 아군에게 킬 달성 시 초기화되는 전투 자극제 효과를 부여합니다.</div>
                    </div>
                    <div class="skill3">
                        <img class="skillimg" src="../../../../img/img_agent/skill/miks/웨이브폼.png">
                        <div class="skilltext">파형</div>
                        <div class="skilltext_">전술 지도를 통해 지정한 위치에 시야를 차단하는 음파 연막을 즉시 생성합니다.</div>
                    </div>
                    <div class="skill4">
                        <img class="skillimg" src="../../../../img/img_agent/skill/miks/요동치는베이스.png">
                        <div class="skilltext">베이스 지진</div>
                        <div class="skilltext_">전방으로 강력한 음파를 보내 적을 밀쳐내고 슬로우 및 청각 악화 효과를 줍니다.</div>
                    </div>
                    <div class="skill5" style="display: none;">
                        <img class="skillimg" src="">
                        <div class="skilltext"></div>
                        <div class="skilltext_"></div>
                    </div>
                <div class="sulbox2">
                    <header>요원의 기본 정보</header>
                    <div class="minisul">
                        <div class="naedragon1">
                        <div class="name sun">name(이름)</div>
                        <div class="name hu">miks</div>
                    </div>
                    <div class="naedragon2">
                        <div class="realname sun">real name(본명)</div>
                        <div class="realname hu">불명</div>
                    </div>
                    <div class="naedragon3">
                        <div class="hometown sun">hometown(고향)</div>
                        <div class="hometown_">
                            <img class="country hu" src="../../../../img/img_agent/country/크로아티아.png">
                            <div class="hometown hu_">크로아티아</div>
                        </div>
                    </div>
                    <div class="naedragon4">
                        <div class="Categorization sun">Categorization(카테고리)</div>
                        <div class="Categorization hu">레디언트</div>
                    </div>
                    </div>
                </div>
            </div>
    </div>
</body>
</html>
