<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>role</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/MonadABXY/mona-font/web/mona.css">
    <link rel="stylesheet" href="../../../../css/agent/realagent.css">
</head>
<body>
    <div class="backgroundblur">
        <a href="../../../home.html">
            <img src="../../../../img/img_home/valorant.svg" width="100" class="logo" >
        </a>
            <div class="rolebox">
                <div class="realrolebox">
                    <div class="agentname"><b>omen</b></div>
                    <img class="agentbox    " src="../../../../img/img_agent/연막/오멘.webp">
                    <img class="rolelogo" src="../../../../img/img_role/연막/연막.svg">
                </div>
                <div class="sulbox">
                    <header>스킬</header>
                    <div class="skillbox">
                        <div class="skill1">
                        <img class="skillimg" src="../../../../img/img_agent/skill/omen/어둠의발자국.png">
                        <div class="skilltext">어둠의 발자국</div>
                        <div class="skilltext_">지정한 위치로 짧은 거리를 텔레포트합니다.</div>
                    </div>
                    <div class="skill2">
                        <img class="skillimg" src="../../../../img/img_agent/skill/omen/피해망상.png"> 
                        <div class="skilltext">피해망상</div>
                        <div class="skilltext_">벽을 통과하는 그림자 파동을 발사하여 닿은 모든 적의 청각과 시야를 제한합니다.</div>
                    </div>
                    <div class="skill3">
                        <img class="skillimg" src="../../../../img/img_agent/skill/omen/어둠의장막.png">
                        <div class="skilltext">어둠의 장막</div>
                        <div class="skilltext_">지정한 위치에 시야를 차단하는 구체 형태의 연막을 생성합니다.</div>
                    </div>
                    <div class="skill4">
                        <img class="skillimg" src="../../../../img/img_agent/skill/omen/그림자습격.png">
                        <div class="skilltext">그림자 습격</div>
                        <div class="skilltext_">지도상의 원하는 전 지역으로 즉시 텔레포트합니다.</div>
                    </div>
                    
                <div class="sulbox2">
                    <header>요원의 기본 정보</header>
                    <div class="minisul">
                        <div class="naedragon1">
                        <div class="name sun">name(이름)</div>
                        <div class="name hu">omen</div>
                    </div>
                    <div class="naedragon2">
                        <div class="realname sun">real name(본명)</div>
                        <div class="realname hu">불명</div>
                    </div>
                    <div class="naedragon3">
                        <div class="hometown sun">hometown(고향)</div>
                        <div class="hometown_">
                            
                            <div class="hometown hu_">불명</div>
                        </div>
                    </div>
                    <div class="naedragon4">
                        <div class="Categorization sun">Categorization(카테고리)</div>
                        <div class="Categorization hu">레디언트</div>
                    </div>
                    </div>
                </div>
            </div>
    </div>
</body>
</html>
