<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>role</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/MonadABXY/mona-font/web/mona.css">
    <link rel="stylesheet" href="../../../../css/agent/realagent.css">
</head>
<body>
    <div class="backgroundblur">
        <a href="../../../home.html">
            <img src="../../../../img/img_home/valorant.svg" width="100" class="logo" >
        </a>
            <div class="rolebox">
                <div class="realrolebox">
                    <div class="agentname"><b>astra</b></div>
                    <img class="agentbox    " src="../../../../img/img_agent/연막/아스트라.webp">
                    <img class="rolelogo" src="../../../../img/img_role/연막/연막.svg">
                </div>
                <div class="sulbox">
                    <header>스킬</header>
                    <div class="skillbox">
                        <div class="skill1">
                        <img class="skillimg" src="../../../../img/img_agent/skill/astra/중력의샘.png">
                        <div class="skilltext">중력의 샘</div>
                        <div class="skilltext_">별을 활성화하여 주변 적들을 중심부로 끌어당기고 취약 상태로 만듭니다.</div>
                    </div>
                    <div class="skill2">
                        <img class="skillimg" src="../../../../img/img_agent/skill/astra/신성파동.png"> 
                        <div class="skilltext">신성파동</div>
                        <div class="skilltext_">별을 활성화하여 강력한 에너지를 폭발시켜 주변 적들을 뇌진탕 상태로 만듭니다.</div>
                    </div>
                    <div class="skill3">
                        <img class="skillimg" src="../../../../img/img_agent/skill/astra/성운소멸.png">
                        <div class="skilltext">성운 / 소멸</div>
                        <div class="skilltext_">별을 활성화하여 연막으로 바꾸거나, 별을 회수하여 임시 연막을 남깁니다.</div>
                    </div>
                    <div class="skill4">
                        <img class="skillimg" src="../../../../img/img_agent/skill/astra/우주장벽.png">
                        <div class="skilltext">우주 장벽</div>
                        <div class="skilltext_">천상계 상태에서 맵을 가로지르는 거대한 벽을 세워 총탄과 소리를 차단합니다.</div>
                    </div>
                    <div class="skill5" style="display: none;">
                        <img class="skillimg" src="">
                        <div class="skilltext"></div>
                        <div class="skilltext_"></div>
                    </div>
                <div class="sulbox2">
                    <header>요원의 기본 정보</header>
                    <div class="minisul">
                        <div class="naedragon1">
                        <div class="name sun">name(이름)</div>
                        <div class="name hu">astra</div>
                    </div>
                    <div class="naedragon2">
                        <div class="realname sun">real name(본명)</div>
                        <div class="realname hu">에페아 데코</div>
                    </div>
                    <div class="naedragon3">
                        <div class="hometown sun">hometown(고향)</div>
                        <div class="hometown_">
                            <img class="country hu" src="../../../../img/img_agent/country/가나.png">
                            <div class="hometown hu_">가나</div>
                        </div>
                    </div>
                    <div class="naedragon4">
                        <div class="Categorization sun">Categorization(카테고리)</div>
                        <div class="Categorization hu">레디언트</div>
                    </div>
                    </div>
                </div>
            </div>
    </div>
</body>
</html>
