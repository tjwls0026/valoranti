<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>role</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/MonadABXY/mona-font/web/mona.css">
    <link rel="stylesheet" href="../../../../css/agent/realagent.css">
</head>
<body>
    <div class="backgroundblur">
        <a href="../../../home.html">
            <img src="../../../../img/img_home/valorant.svg" width="100" class="logo" >
        </a>
            <div class="rolebox">
                <div class="realrolebox">
                    <div class="agentname"><b>clove</b></div>
                    <img class="agentbox    " src="../../../../img/img_agent/연막/클로브.webp">
                    <img class="rolelogo" src="../../../../img/img_role/연막/연막.svg">
                </div>
                <div class="sulbox">
                    <header>스킬</header>
                    <div class="skillbox">
                        <div class="skill1">
                        <img class="skillimg" src="../../../../img/img_agent/skill/clove/간섭.png">
                        <div class="skilltext">간섭</div>
                        <div class="skilltext_">에센스 파편을 던져 폭발 범위 내의 모든 적에게 일시적으로 부패 효과를 줍니다.</div>
                    </div>
                    <div class="skill2">
                        <img class="skillimg" src="../../../../img/img_agent/skill/clove/계략.png"> 
                        <div class="skilltext">계략</div>
                        <div class="skilltext_">지정한 위치에 연막을 생성하며, 사망한 후에도 유령 상태로 연막을 칠 수 있습니다.</div>
                    </div>
                    <div class="skill3">
                        <img class="skillimg" src="../../../../img/img_agent/skill/clove/활력회복.png">
                        <div class="skilltext">활력 회복</div>
                        <div class="skilltext_">쓰러진 적의 생명력을 흡수하여 일시적으로 이동 속도 증가와 체력을 얻습니다.</div>
                    </div>
                    <div class="skill4">
                        <img class="skillimg" src="../../../../img/img_agent/skill/clove/아직안죽었어.png">
                        <div class="skilltext">아직 안 죽었어</div>
                        <div class="skilltext_">사망 직후 부활하여 짧은 시간 내에 처치나 어시스트를 올리면 완전히 살아납니다.</div>
                    </div>
                    <div class="skill5" style="display: none;">
                        <img class="skillimg" src="">
                        <div class="skilltext"></div>
                        <div class="skilltext_"></div>
                    </div>
                <div class="sulbox2">
                    <header>요원의 기본 정보</header>
                    <div class="minisul">
                        <div class="naedragon1">
                        <div class="name sun">name(이름)</div>
                        <div class="name hu">clove</div>
                    </div>
                    <div class="naedragon2">
                        <div class="realname sun">real name(본명)</div>
                        <div class="realname hu">불명</div>
                    </div>
                    <div class="naedragon3">
                        <div class="hometown sun">hometown(고향)</div>
                        <div class="hometown_">
                            <img class="country hu" src="../../../../img/img_agent/country/영국.png">
                            <div class="hometown hu_">스코틀랜드</div>
                        </div>
                    </div>
                    <div class="naedragon4">
                        <div class="Categorization sun">Categorization(카테고리)</div>
                        <div class="Categorization hu">레디언트</div>
                    </div>
                    </div>
                </div>
            </div>
    </div>
</body>
</html>
